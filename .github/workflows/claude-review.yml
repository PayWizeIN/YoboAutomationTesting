name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # Skip for fork PRs (security - they can't access secrets)
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        id: claude_review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-4-20250514"
          timeout_minutes: 10
          prompt: |
            You are reviewing code in a multi-repo environment. Auto-detect the tech stack from:
            - File extensions and imports
            - package.json / requirements.txt / composer.json / go.mod

            Review this PR for:

            ## Security (Critical)
            - Injection vulnerabilities (SQL, XSS, command injection)
            - Authentication/authorization bypasses
            - Secrets or credentials in code
            - Insecure dependencies

            ## Optimization
            - Redundant computations that could be cached
            - Unnecessary API calls or database queries
            - React: Missing useMemo/useCallback for expensive operations
            - Node.js: Blocking operations that should be async
            - Database: Missing WHERE clauses, unindexed queries
            - Bundle size: Large imports that could be tree-shaken

            ## Performance
            - N+1 queries (especially in ORMs like Sequelize, Mongoose, Eloquent)
            - Memory leaks (unclosed connections, event listeners, intervals)
            - Unoptimized loops and data structures

            ## Code Quality
            - Logic bugs and edge cases
            - Missing error handling
            - Framework-specific anti-patterns:
              - React: Prop drilling, unnecessary re-renders
              - Node/Express: Unhandled promise rejections
              - Laravel: N+1 queries, missing eager loading
              - Python: Mutable default arguments

            FORMAT YOUR RESPONSE EXACTLY AS:

            If issues found:
            ## Issues Found

            ### [Category] (N issues)
            <details>
            <summary>[Brief title] in `filename:line`</summary>

            **Issue:** [Description]
            **Fix:** [How to fix with code example if applicable]
            </details>

            If NO issues:
            ## Approved

            No significant issues found. Code looks good.

            RULES:
            - Maximum 5 issues total (prioritize security first)
            - Use <details> tags for collapsibility
            - Include file:line references
            - Skip style/formatting nitpicks
            - Be concise but actionable

      - name: Request Review if Issues Found
        uses: actions/github-script@v7
        with:
          script: |
            // Wait a moment for Claude's comment to be posted
            await new Promise(resolve => setTimeout(resolve, 5000));

            // Get PR comments to check Claude's review
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 20
            });

            // Look for Claude's "Issues Found" marker in recent comments
            const claudeComment = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('## Issues Found')
            );

            if (claudeComment) {
              const prAuthor = context.payload.pull_request.user.login;
              const reviewers = ['sreedeepnarayan', 'gauravpaywize']
                .filter(r => r.toLowerCase() !== prAuthor.toLowerCase());

              if (reviewers.length > 0) {
                try {
                  await github.rest.pulls.requestReviewers({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.issue.number,
                    reviewers: reviewers
                  });
                  console.log(`Review requested from: ${reviewers.join(', ')}`);
                } catch (error) {
                  console.log(`Could not request reviewers: ${error.message}`);
                  // Still succeed - reviewers might not have access to all repos
                }
              }
            } else {
              console.log('No issues found by Claude, skipping review request');
            }
