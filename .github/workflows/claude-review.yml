name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude review'))
    runs-on: ubuntu-latest
    steps:
      - name: Get PR info for comment trigger
        id: pr_info
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('number', context.issue.number);

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ steps.pr_info.outputs.ref || github.head_ref }}

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude review"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr_info.outputs.number || github.event.pull_request.number }}

            Review this PR for:
            - Security vulnerabilities (injection, auth bypasses, secrets in code)
            - Performance issues (N+1 queries, memory leaks)
            - Code quality (logic bugs, missing error handling)
            - Optimization opportunities

            Focus on significant issues only. Skip style nitpicks.

            HOW TO POST YOUR REVIEW:
            1. Use `mcp__github_inline_comment__create_inline_comment` to add comments on specific lines of code
            2. Use `gh pr comment` for a summary comment

            FORMAT YOUR SUMMARY AS:
            ## PR Review Summary

            ### Critical Issues
            - Issue 1 with file:line reference

            ### Bugs
            - Bug 1 with file:line reference

            ### Suggestions
            - Suggestion 1

            Use proper markdown formatting with headers, bullet points, and code blocks.
          claude_args: |
            --model haiku
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
